name: Lint And Build Package

on:
  push:
    branches:
      - main
      - lwj/skip_test
  pull_request:
    branches:
      - main
      - lwj/skip_test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.9'

      - name: test
        run: |
          pip install pytest
          python -m pytest --last-failed -vx tests/lwj/
          python -m pytest --lf --last-failed-no-failures none -v tests/lwj/ 
      

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.9'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install deps
        shell: bash
        run: |
          set -ex
          cp LazyLLM-Env/poetry.lock . 
          export POETRY_CACHE_DIR=$(mktemp -d)
          poetry install
          rm -rf $POETRY_CACHE_DIR

      - name: Build
        shell: bash
        run: poetry build

      - name: Test installing built package
        shell: bash
        run: python -m pip install .

      - name: Test import
        shell: bash
        working-directory: /tmp
        run: python -c "import lazyllm"