name: Lint And Build Package

on:
  push:
    branches:
      - main
      - lwj/skip_test
  pull_request:
    branches:
      - main
      - lwj/skip_test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_PATH: '/root/actions-runner/${{ github.repository }}/${GITHUB_RUN_NUMBER}'

jobs:
  Clone:
    if: |
      !contains(github.event.head_commit.message, '[skip ci]')
      && !contains(github.event.pull_request.title, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up python 3.10.9
        uses: actions/setup-python@v5
        with:
          python-version: 3.10.9

      # - name: Create custom directory
      #   run: |
      #     set -ex
      #     echo ${{ env.CI_PATH }}
      #     mkdir -p ${{ env.CI_PATH }}

      # - name: Clean custom directory
      #   run: |
      #     set -ex
      #     if [ -d "${{ env.CI_PATH }}" ]; then
      #       rm -rf ${{ env.CI_PATH }}/*
      #     fi

      - name: Move code to custom directory
        run: |
          set -ex
          # echo 9
          # echo "Event name: ${{ github.event_name }}"
          # echo "${{ github.event.pull_request.title }}"
          # mv $GITHUB_WORKSPACE/* ${{ env.CI_PATH }}/
          pip install lazyllm
          pip list
          pip list|wc -l
      
  test:
    runs-on: ubuntu-latest
    needs: [Clone]
    steps:
      - name: test
        run: |
          cd ${{ env.CI_PATH }}
          pip install pytest
          python -m pytest --lf --last-failed-no-failures=all -v tests/lwj/ 
      

   
