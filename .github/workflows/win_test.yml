name: Test on Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - lwj/test_on_win
  pull_request:
    branches:
      - main

jobs:
  Win_Test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.10.9]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Copy poetry.lock to root directory
        run: |
          git branch
          cd LazyLLM-Env && git branch
          cd ..
          copy LazyLLM-Env\\poetry.lock .
          dir
          whoami
          ls C:\Users\

      - name: Set up python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download model
        run: |
          pip install modelscope
          mkdir /c/Users/runneradmin/.lazyllm
          mkdir -p  /c/Users/runneradmin/.cache/modelscope/hub
          cmd /c mklink /D C:\Users\runneradmin\.lazyllm\model C:\Users\runneradmin\.cache\modelscope\hub
          modelscope download Shanghai_AI_Laboratory/internlm2-chat-7b &
          dir C:\Users\runneradmin\.lazyllm\model

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Build project with Poetry
        run: |
          poetry build

      - name: List dist directory
        run: dir dist

      - name: Install the built package
        run: |
          pip install dist\\lazyllm*.whl

      - name: basic_tests
        run: |
          git clone https://$GITHUB_TOKEN@github.com/LazyAGI/LazyLLM-Data.git C:\\tmp\\lazyllm\\data
          pip install -r tests/requirements.txt
          set LAZYLLM_DATA_PATH=C:\\tmp\\lazyllm\\data
          python -m pytest -v --reruns=2 tests\\basic_tests\\
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
