name: Test on Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - lwj/test_on_win
  pull_request:
    branches:
      - main

env:
  POETRY_VERSION: "1.8.3"
  PYTHON_VERSION: "3.10.9"

jobs:
  Win_Test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Copy poetry.lock to root directory
        shell: bash
        run: |
          git branch
          cd LazyLLM-Env && git branch
          cd ..
          cp LazyLLM-Env/poetry.lock .
          ls

      - name: Set up python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download model
        shell: cmd
        run: |
          pip install modelscope pyyaml
          mkdir C:\Users\runneradmin\.lazyllm
          ls C:\Users\runneradmin\.lazyllm
          mkdir C:\Users\runneradmin\.cache\modelscope\hub
          mklink /D C:\Users\runneradmin\.lazyllm\model C:\Users\runneradmin\.cache\modelscope\hub
          start /b modelscope download Shanghai_AI_Laboratory/internlm2-chat-7b

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Build project with Poetry
        shell: bash
        run: |
          poetry build

      - name: List dist directory
        shell: bash
        run: dir dist

      - name: Install the built package
        shell: bash
        run: |
          pip install dist/lazyllm*.whl

      - name: basic_tests
        shell: bash
        run: |
          mkdir -p D:/a/LazyLLM/data
          git clone https://$GITHUB_TOKEN@github.com/LazyAGI/LazyLLM-Data.git D:/a/LazyLLM/data
          pip install -r tests/requirements.txt
          export LAZYLLM_DATA_PATH=D:/a/LazyLLM/data
          python -m pytest -v --reruns=2 tests/basic_tests
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
